<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input</title>
    <link rel="stylesheet" href="input.css">
</head>
<body>
    <form class="center" >
        <div>
<input class="space" type="button" value="click"><br>
<input class="space" type="checkbox"><br>
<input class="space" type="color"><br>
<input class="space" type="date"> <br>
<input class="space" type="datetime-local"><br>
<input class="space" type="email" placeholder="email"><br>
<input class="space" type="file"><br>
<input class="space" type="hidden"><br>
<input class="space" type="image"><br>
<input class="space" type="month"><br>
<input class="space" type="number" placeholder="number"><br>
<input class="space" type="password" placeholder="password"><br>
<input class="space" type="radio"><br>
<input class="space" type="range"><br>
<input class="space" type="reset"><br>
<input class="space" type="search" placeholder="search"><br>
<input class="space" type="submit"><br>
<input class="space" type="tel" placeholder="tel"><br>
<input class="space" type="text" placeholder="text"> <br>
<input class="space" type="time"><br>
<input class="space" type="url"><br>
<input class="space" type="week"><br>
</div>
    </form>
</body>
</html>
